name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Unit tests only (no DB needed)
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run tests/unit

  # Job 2: E2E tests against Vercel preview with Neon branch DB
  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium

      # Deploy Vercel preview (uses production DB — test data is prefixed and cleaned up)
      - name: Deploy Vercel preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel

          OUTPUT=$(vercel deploy \
            --yes \
            --token $VERCEL_TOKEN \
            --public \
            2>&1) || true

          echo "$OUTPUT"

          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | head -1)

          if [ -z "$URL" ]; then
            echo "ERROR: No preview URL captured from Vercel deploy"
            exit 1
          fi

          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview deployed: $URL"

      # Wait for deployment to be ready
      - name: Wait for deployment
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/login")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then
              echo "Ready! ($STATUS)"
              exit 0
            fi
            echo "Waiting... ($STATUS)"
            sleep 5
          done
          echo "Timeout" && exit 1

      # Run Playwright tests against preview (no simulation seed — just UX smoke tests)
      - name: Run Playwright tests
        env:
          TEST_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          npx playwright test \
            --config tests/simulation/playwright/playwright.config.ts \
            --grep "@noauth" \
            --grep-invert "Invalid password" \
            --update-snapshots

      # Upload test results on failure
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
